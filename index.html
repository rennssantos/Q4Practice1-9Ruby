<body>
    <h1>JavaScript Conditional Statements</h1>

    <form>
        <label for="age">Age:</label>
        <input type="text" id="age" class="form-control" placeholder="Enter age here">
        <button type="submit" id="btn_age" class="btn btn-info" onclick="checkAge()">Check</button>
    </form>

    <script>
        function checkAge(){
            let age = document.getElementById("age").value;

            if(isNaN(age) || age < 0){
                alert("Please enter a valid input.");
            }
            else if(age < 18){
                alert("You are underage.");
            }
            else if( age > 18){
                alert("You are of legal age.");
            }
            else{
                alert("Age could be categorized.");
            }

         }
